/* ==================================================================
   DELTA BASE LAYER · base.css
   Owns the theme tokens, the page grid, base typography, and a small
   set of utility classes and shared interactive primitives (buttons,
   inputs, range sliders, widget shell, tables, code blocks).

   This is the default look for both `article` and `book` documents.
   Delta's own chrome (section headings, theorem/proof boxes, equation
   numbers) lives next to each feature in `components/<name>.css`
   (wrapped in @layer delta.components). Per-document-type token
   overrides live in `themes/<type>.css` (@layer delta.theme) and are
   selected by `<document type="…">`.

   All tokens are namespaced `--delta-*`; theming = override those.

   -- TABLE OF CONTENTS -----------------------------------------------
   1. TOKENS              colors · type · scale · layout · motion
   2. RESET & BASE        box-sizing, body, selection, media
   3. TYPOGRAPHY          base text, prose, links, smcaps utilities
   4. PAGE LAYOUT         .page (flow column + sidenote rail) · .sidenote
                          · .bleed
   5. SHARED INTERACTIVE  .btn · .input · .range · .field-label · .kbd
                          .widget shell (head/body/foot)
   6. TABLES & CODE       .table-wrap · table.t · .code
   7. RESPONSIVE          tablet → phone breakpoints (for the rules above)
   ================================================================== */


/* Cascade order — declared once, here, in the first stylesheet the page
   loads. Components live in @layer delta.components, per-type themes in
   @layer delta.theme, so themes always win regardless of <style> order.
   (Unlayered rules — e.g. inlined KaTeX — still beat all of these.) */
@layer delta.base, delta.components, delta.theme;

@layer delta.base {

/* --- 1. TOKENS --------------------------------------------------- */

:root {
  /* -- color */
  --delta-paper:        oklch(0.965 0.012 78);
  --delta-paper-edge:   oklch(0.945 0.014 78);
  --delta-surface-1:    oklch(0.985 0.008 78);
  --delta-surface-2:    oklch(0.935 0.012 78);
  --delta-ink:          oklch(0.18 0.006 75);
  --delta-ink-soft:     oklch(0.34 0.006 75);
  --delta-mute:         oklch(0.56 0.008 75);
  --delta-rule:         oklch(0.86 0.012 78);
  --delta-rule-soft:    oklch(0.91 0.012 78);

  --delta-accent:       oklch(0.80 0.062 150);
  --delta-accent-ink:   oklch(0.38 0.07  150);
  --delta-accent-soft:  oklch(0.93 0.04  150);

  --delta-ok:           oklch(0.46 0.10 150);
  --delta-warn:         oklch(0.50 0.13 22);

  --delta-code-bg:      oklch(0.21 0.008 75);
  --delta-code-fg:      oklch(0.94 0.005 75);
  --delta-code-line:    oklch(0.32 0.008 75);
  --delta-code-mute:    oklch(0.62 0.012 75);

  /* -- chrome (consumed by components/*.css; override per theme) */
  --delta-env-bg:       var(--delta-surface-2);
  --delta-env-border:   var(--delta-accent-ink);

  /* -- type families */
  --delta-serif:        "Newsreader", "Source Serif 4", ui-serif, Georgia, serif;
  --delta-sans:         ui-sans-serif, -apple-system, "Helvetica Neue", system-ui, sans-serif;
  --delta-mono:         "JetBrains Mono", ui-monospace, "SF Mono", Menlo, monospace;

  /* -- type scale (clamped where it matters) */
  --delta-t-base:       18px;
  --delta-t-lede:       1em;
  --delta-t-h1:         clamp(44px, 5.6vw, 84px);
  --delta-t-h2:         clamp(24px, 2.6vw, 30px);
  --delta-t-h3:         clamp(18px, 1.9vw, 21px);
  --delta-t-h4:         clamp(16px, 1.5vw, 18px);
  --delta-t-deck:       clamp(18px, 1.7vw, 22px);
  --delta-t-small:      0.78em;
  --delta-math-scale:   1.05em;         /* inline/display math size — tames KaTeX's 1.21em default */
  --delta-leading:      1.65;
  --delta-leading-tight:1.15;
  --delta-tracking-cap: 0.12em;

  /* -- layout */
  --delta-measure:      64ch;          /* main text column width */
  --delta-margin-w:     16ch;          /* sidenote rail (floated marginalia) */
  --delta-col-gap:      56px;          /* gap between text column and rail */
  --delta-page-max:     1240px;
  --delta-page-pad-x:   40px;
  --delta-page-pad-y:   64px;
  --delta-section-gap:  80px;
  --delta-block-gap:    28px;

  /* -- shape */
  --delta-radius-sm:    4px;
  --delta-radius:       6px;
  --delta-radius-lg:    10px;
  --delta-radius-pill:  100px;
  --delta-hairline:     1px;
  --delta-random-rotation: 1deg;

  /* -- shadow — warm-toned, very low contrast; only on lifted blocks */
  --delta-shadow-sm:    0 1px 2px rgba(60, 50, 30, .045);
  --delta-shadow:       0 1px 1px rgba(60, 50, 30, .035),
                        0 6px 18px rgba(60, 50, 30, .055);
  --delta-shadow-lift:  0 1px 2px rgba(60, 50, 30, .04),
                        0 14px 36px rgba(60, 50, 30, .07);
  --delta-shadow-code:  0 1px 1px rgba(0, 0, 0, .04),
                        0 10px 28px rgba(0, 0, 0, .10);

  /* -- motion */
  --delta-ease:         cubic-bezier(.2,.7,.2,1);
  --delta-dur-fast:     .15s;
  --delta-dur:          .25s;
  --delta-dur-slow:     .45s;
}

/* accent palettes — soft pastel tones named by their hue, so a value is easy to
   guess (red, orange, …, slate). Each overrides only the three accent vars; the
   default (no data-accent) is "green", matching the :root values above. */
[data-accent="red"]    { --delta-accent: oklch(0.79 0.072 25);  --delta-accent-ink: oklch(0.46 0.115 25);  --delta-accent-soft: oklch(0.95 0.045 25);  }
[data-accent="orange"] { --delta-accent: oklch(0.82 0.080 55);  --delta-accent-ink: oklch(0.48 0.110 55);  --delta-accent-soft: oklch(0.95 0.050 55);  }
[data-accent="yellow"] { --delta-accent: oklch(0.87 0.085 92);  --delta-accent-ink: oklch(0.47 0.095 92);  --delta-accent-soft: oklch(0.96 0.052 92);  }
[data-accent="lime"]   { --delta-accent: oklch(0.84 0.080 128); --delta-accent-ink: oklch(0.44 0.090 128); --delta-accent-soft: oklch(0.95 0.045 128); }
[data-accent="green"]  { --delta-accent: oklch(0.80 0.062 150); --delta-accent-ink: oklch(0.38 0.070 150); --delta-accent-soft: oklch(0.93 0.040 150); }
[data-accent="teal"]   { --delta-accent: oklch(0.80 0.060 185); --delta-accent-ink: oklch(0.43 0.075 185); --delta-accent-soft: oklch(0.94 0.038 185); }
[data-accent="sky"]    { --delta-accent: oklch(0.81 0.064 225); --delta-accent-ink: oklch(0.46 0.095 225); --delta-accent-soft: oklch(0.94 0.042 225); }
[data-accent="blue"]   { --delta-accent: oklch(0.78 0.072 260); --delta-accent-ink: oklch(0.46 0.110 260); --delta-accent-soft: oklch(0.94 0.044 260); }
[data-accent="indigo"] { --delta-accent: oklch(0.78 0.072 285); --delta-accent-ink: oklch(0.44 0.105 285); --delta-accent-soft: oklch(0.94 0.044 285); }
[data-accent="purple"] { --delta-accent: oklch(0.80 0.070 310); --delta-accent-ink: oklch(0.45 0.105 310); --delta-accent-soft: oklch(0.95 0.044 310); }
[data-accent="pink"]   { --delta-accent: oklch(0.83 0.072 350); --delta-accent-ink: oklch(0.47 0.110 350); --delta-accent-soft: oklch(0.95 0.046 350); }
[data-accent="slate"]  { --delta-accent: oklch(0.78 0.030 245); --delta-accent-ink: oklch(0.36 0.040 245); --delta-accent-soft: oklch(0.93 0.022 245); }


/* dark mode — a token override (the same model as the accent palettes above), opted
   into with `<document theme-mode="dark">` → `data-mode="dark"`, or `="auto"` to follow
   the viewer's OS. It inverts the neutral ramp (warm hue kept, so the dark stays on-brand)
   and re-derives only the two accent tones that assume a light page: `-ink` becomes the
   vivid pastel `--delta-accent` (bright on dark — links, titles, kicker, inverted-divider
   bg, progress fill), `-soft` a dark accent tint. The per-hue `--delta-accent` blocks above
   are unchanged, so every accent keeps working. Components read tokens only, so flipping
   these flips the whole system, deck chrome included.

   The declaration list is intentionally repeated for the `[data-mode="auto"]` + media case
   (no build-time preprocessing) — keep the two blocks in sync. */
[data-mode="dark"] {
  color-scheme: dark;

  --delta-paper:        oklch(0.205 0.008 75);
  --delta-paper-edge:   oklch(0.17  0.008 75);
  --delta-surface-1:    oklch(0.245 0.009 75);
  --delta-surface-2:    oklch(0.29  0.010 75);
  --delta-ink:          oklch(0.92  0.006 75);
  --delta-ink-soft:     oklch(0.78  0.006 75);
  --delta-mute:         oklch(0.62  0.008 75);
  --delta-rule:         oklch(0.36  0.010 75);
  --delta-rule-soft:    oklch(0.29  0.010 75);

  --delta-accent-ink:   var(--delta-accent);
  --delta-accent-soft:  color-mix(in oklab, var(--delta-accent) 20%, var(--delta-paper));

  --delta-ok:           oklch(0.72 0.12 150);
  --delta-warn:         oklch(0.70 0.15 22);

  --delta-code-bg:      oklch(0.26 0.010 75);

  --delta-shadow-sm:    0 1px 2px rgba(0, 0, 0, .40);
  --delta-shadow:       0 1px 1px rgba(0, 0, 0, .35), 0 6px 18px rgba(0, 0, 0, .50);
  --delta-shadow-lift:  0 1px 2px rgba(0, 0, 0, .35), 0 14px 36px rgba(0, 0, 0, .55);
  --delta-shadow-code:  0 1px 1px rgba(0, 0, 0, .40), 0 10px 28px rgba(0, 0, 0, .55);
}
@media (prefers-color-scheme: dark) {
  [data-mode="auto"] {
    color-scheme: dark;

    --delta-paper:        oklch(0.205 0.008 75);
    --delta-paper-edge:   oklch(0.17  0.008 75);
    --delta-surface-1:    oklch(0.245 0.009 75);
    --delta-surface-2:    oklch(0.29  0.010 75);
    --delta-ink:          oklch(0.92  0.006 75);
    --delta-ink-soft:     oklch(0.78  0.006 75);
    --delta-mute:         oklch(0.62  0.008 75);
    --delta-rule:         oklch(0.36  0.010 75);
    --delta-rule-soft:    oklch(0.29  0.010 75);

    --delta-accent-ink:   var(--delta-accent);
    --delta-accent-soft:  color-mix(in oklab, var(--delta-accent) 20%, var(--delta-paper));

    --delta-ok:           oklch(0.72 0.12 150);
    --delta-warn:         oklch(0.70 0.15 22);

    --delta-code-bg:      oklch(0.26 0.010 75);

    --delta-shadow-sm:    0 1px 2px rgba(0, 0, 0, .40);
    --delta-shadow:       0 1px 1px rgba(0, 0, 0, .35), 0 6px 18px rgba(0, 0, 0, .50);
    --delta-shadow-lift:  0 1px 2px rgba(0, 0, 0, .35), 0 14px 36px rgba(0, 0, 0, .55);
    --delta-shadow-code:  0 1px 1px rgba(0, 0, 0, .40), 0 10px 28px rgba(0, 0, 0, .55);
  }
}


/* --- 2. RESET & BASE -------------------------------------------- */

*,
*::before,
*::after { box-sizing: border-box; }

html, body { margin: 0; padding: 0; }

html { background: var(--delta-paper); }

body {
  color: var(--delta-ink);
  background: var(--delta-paper);
  font-family: var(--delta-serif);
  font-size: var(--delta-t-base);
  line-height: var(--delta-leading);
  font-optical-sizing: auto;
  font-variation-settings: "opsz" 16;
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}

::selection { background: var(--delta-accent-soft); color: var(--delta-ink); }

img, svg { max-width: 100%; height: auto; display: block; }


/* --- 3. TYPOGRAPHY ---------------------------------------------- */

.eyebrow,
.tag,
.smcaps-tag {
  font-family: var(--delta-sans);
  font-size: 12px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--delta-mute);
}

p {
  line-height: var(--delta-leading);
  margin: 0 0 1.05em;
  text-wrap: pretty;
  hyphens: auto;
}

.lede::first-line {
  font-variant-caps: all-small-caps;
  letter-spacing: 0.08em;
}
.lede::first-letter {
  font-family: var(--delta-serif);
  font-weight: 500;
  initial-letter: 3 2;
  -webkit-initial-letter: 3 2;
  color: var(--delta-accent-ink);
  margin-right: 8px;
}

a {
  color: var(--delta-accent-ink);
  text-decoration: none;
}
.ref {
  color: var(--delta-accent-ink);
  border-bottom: 1px dashed color-mix(in oklab, var(--delta-accent-ink) 50%, transparent);
  padding-bottom: 1px;
  cursor: pointer;
  transition: background var(--delta-dur-fast) var(--delta-ease), border-color var(--delta-dur-fast) var(--delta-ease);
}
.ref:hover {
  background: color-mix(in oklab, var(--delta-accent-soft) 60%, transparent);
  border-color: var(--delta-accent-ink);
}

.smcaps  { font-variant-caps: all-small-caps; letter-spacing: 0.08em; }
.dot-sep { color: var(--delta-rule); margin: 0 10px; }



/* --- 4. PAGE LAYOUT --------------------------------------------- */

/* The page is a single flow column the width of the measure, with a
   reserved right rail (gap + --delta-margin-w) that floated sidenotes
   drop into so they sit beside the line that references them. .bleed
   reclaims the rail to span the full writing area. Content nests as a
   real document tree (delta-document » delta-section » delta-subsection).
   `delta-document` is the compiled root, so it carries the page model. */
.page,
delta-document {
  display: block;
  max-width: min(var(--delta-page-max),
                 calc(var(--delta-measure) + var(--delta-col-gap) + var(--delta-margin-w)));
  margin: 0 auto;
  /* reserve the rail on the right so normal flow stays within --delta-measure */
  padding: var(--delta-page-pad-y)
           calc(var(--delta-page-pad-x) + var(--delta-col-gap) + var(--delta-margin-w))
           calc(var(--delta-page-pad-y) * 2.5)
           var(--delta-page-pad-x);
}

.sidenote {
  float: right;
  clear: right;
  width: var(--delta-margin-w);
  margin-right: calc(-1 * (var(--delta-col-gap) + var(--delta-margin-w)));
  margin-bottom: var(--delta-block-gap);
}

.bleed {
  /* reclaim the reserved rail to span measure + gap + rail */
  margin-right: calc(-1 * (var(--delta-col-gap) + var(--delta-margin-w)));
  min-width: 0;
}


/* --- 5. SHARED INTERACTIVE PRIMITIVES --------------------------- */

/* buttons */
.btn {
  font-family: var(--delta-sans);
  font-size: 13px;
  font-weight: 500;
  padding: 9px 16px;
  border-radius: var(--delta-radius);
  border: var(--delta-hairline) solid var(--delta-rule);
  background: var(--delta-surface-1);
  color: var(--delta-ink);
  cursor: pointer;
  transition: background var(--delta-dur-fast) var(--delta-ease),
              filter var(--delta-dur-fast) var(--delta-ease),
              color var(--delta-dur-fast) var(--delta-ease);
  letter-spacing: 0.005em;
  white-space: nowrap;
}
.btn:hover { background: var(--delta-surface-2); }
.btn.primary {
  background: var(--delta-accent-ink);
  color: var(--delta-paper);
  border-color: var(--delta-accent-ink);
}
.btn.primary:hover { filter: brightness(1.06); }
.btn.ghost {
  background: transparent;
  border-color: transparent;
  color: var(--delta-ink-soft);
}
.btn.ghost:hover { background: var(--delta-surface-2); color: var(--delta-ink); }
.btn:disabled { opacity: 0.4; cursor: default; }

/* inputs */
.input {
  font-family: var(--delta-mono);
  font-size: 14px;
  padding: 9px 12px;
  border-radius: var(--delta-radius);
  border: var(--delta-hairline) solid var(--delta-rule);
  background: var(--delta-paper);
  color: var(--delta-ink);
  outline: none;
  transition: border-color var(--delta-dur-fast) var(--delta-ease),
              box-shadow var(--delta-dur-fast) var(--delta-ease);
  width: 100%;
}
.input:focus {
  border-color: var(--delta-accent-ink);
  box-shadow: 0 0 0 3px var(--delta-accent-soft);
}
.field-label {
  font-family: var(--delta-sans);
  font-size: 11px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--delta-mute);
  margin-bottom: 6px;
  display: block;
}

/* range / slider */
.range {
  -webkit-appearance: none;
  appearance: none;
  width: 100%;
  height: 22px;
  background: transparent;
  cursor: pointer;
}
.range::-webkit-slider-runnable-track { height: 2px; background: var(--delta-rule); border-radius: 2px; }
.range::-moz-range-track              { height: 2px; background: var(--delta-rule); border-radius: 2px; }
.range::-webkit-slider-thumb {
  -webkit-appearance: none; appearance: none;
  width: 18px; height: 18px;
  border-radius: 50%;
  background: var(--delta-paper);
  border: 1.5px solid var(--delta-accent-ink);
  margin-top: -8px;
  box-shadow: var(--delta-shadow-sm);
  transition: transform var(--delta-dur-fast) var(--delta-ease);
}
.range::-webkit-slider-thumb:hover { transform: scale(1.08); }
.range::-moz-range-thumb {
  width: 18px; height: 18px;
  border-radius: 50%;
  background: var(--delta-paper);
  border: 1.5px solid var(--delta-accent-ink);
  box-shadow: var(--delta-shadow-sm);
}

/* widget shell — bordered card with optional head / body / foot regions.
   Used by any interactive component (Fourier widgets, derivation slides,
   future authoring widgets). Pure container styling — visual extras live
   in each component's own CSS. */
.widget {
  background: var(--delta-surface-1);
  border: var(--delta-hairline) solid var(--delta-rule);
  border-radius: var(--delta-radius-lg);
  margin: 36px 0 var(--delta-block-gap);
  overflow: hidden;
  box-shadow: var(--delta-shadow-lift);
}
.widget-head {
  padding: 14px 22px;
  border-bottom: var(--delta-hairline) solid var(--delta-rule-soft);
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  align-items: baseline;
  justify-content: space-between;
  background: var(--delta-paper);
}
.widget-head .lbl {
  font-family: var(--delta-sans);
  font-size: 11px;
  letter-spacing: var(--delta-tracking-cap);
  text-transform: uppercase;
  color: var(--delta-accent-ink);
}
.widget-head .ttl {
  font-family: var(--delta-serif);
  font-size: 17px;
  font-weight: 500;
  margin-left: 12px;
  color: var(--delta-ink);
}
.widget-head .meta {
  font-family: var(--delta-mono);
  font-size: 12px;
  color: var(--delta-mute);
}
.widget-body { padding: 22px; }
.widget-foot {
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  gap: 12px 18px;
  padding: 14px 22px;
  border-top: var(--delta-hairline) solid var(--delta-rule-soft);
  background: var(--delta-paper);
  font-family: var(--delta-sans);
  font-size: 13px;
  color: var(--delta-ink-soft);
}
.widget-foot label { display: flex; align-items: center; gap: 8px; cursor: pointer; }

.kbd {
  font-family: var(--delta-mono);
  font-size: 11px;
  padding: 2px 6px;
  border-radius: var(--delta-radius-sm);
  background: var(--delta-surface-2);
  border: var(--delta-hairline) solid var(--delta-rule);
  color: var(--delta-ink-soft);
}

/* The anchored popover shell (.delta-pop) moved to components/popover.css,
   next to its controller (src/runtime/utils.ts). */


/* --- 6. TABLES & CODE ------------------------------------------- */

.table-wrap {
  overflow-x: auto;
  margin: 30px 0;
}
table.t {
  width: 100%;
  min-width: 480px;
  border-collapse: collapse;
  font-size: 15px;
  font-variant-numeric: tabular-nums lining-nums;
  margin: 0;
}
table.t caption {
  text-align: left;
  font-family: var(--delta-sans);
  font-size: 11.5px;
  letter-spacing: var(--delta-tracking-cap);
  text-transform: uppercase;
  color: var(--delta-ink);
  padding: 0 0 12px;
}
table.t thead th {
  text-align: left;
  font-family: var(--delta-sans);
  font-weight: 500;
  font-size: 11.5px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--delta-mute);
  padding: 0 14px 8px;
  border-bottom: var(--delta-hairline) solid var(--delta-ink);
}
table.t tbody td {
  padding: 11px 14px;
  border-bottom: var(--delta-hairline) solid var(--delta-rule-soft);
  vertical-align: top;
}
table.t tbody tr:last-child td { border-bottom: var(--delta-hairline) solid var(--delta-ink); }
table.t .num { text-align: right; font-variant-numeric: tabular-nums; }
table.t .mono { font-family: var(--delta-mono); font-size: 13px; }

.code {
  background: var(--delta-code-bg);
  color: var(--delta-code-fg);
  border-radius: var(--delta-radius-lg);
  padding: 18px 20px;
  font-family: var(--delta-mono);
  font-size: 13.5px;
  line-height: 1.62;
  overflow-x: auto;
  margin: var(--delta-block-gap) 0;
  position: relative;
  -webkit-overflow-scrolling: touch;
  box-shadow: var(--delta-shadow-code);
}
.code-head {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  align-items: center;
  justify-content: space-between;
  font-family: var(--delta-sans);
  font-size: 11px;
  letter-spacing: var(--delta-tracking-cap);
  text-transform: uppercase;
  color: var(--delta-code-mute);
  margin: -4px 0 14px;
  padding-bottom: 12px;
  border-bottom: var(--delta-hairline) solid var(--delta-code-line);
}
.code-head .dot {
  display: inline-block;
  width: 7px; height: 7px;
  border-radius: 50%;
  background: var(--delta-accent);
  margin-right: 9px;
  vertical-align: 1px;
}
.code .k { color: oklch(0.86 0.085 92); }
.code .s { color: oklch(0.85 0.062 150); }
.code .n { color: oklch(0.84 0.06 22); }
.code .c { color: oklch(0.58 0.012 75); font-style: italic; }
.code .f { color: oklch(0.84 0.05 270); }
.code .op{ color: oklch(0.86 0.01 75); }
.code .l {
  color: var(--delta-code-mute);
  user-select: none;
  padding-right: 16px;
  display: inline-block;
  min-width: 28px;
  text-align: right;
}


/* --- 7. RESPONSIVE ---------------------------------------------- */

@media (max-width: 1200px) {
  :root {
    --delta-col-gap: 40px;
    --delta-page-pad-x: 32px;
    --delta-page-pad-y: 56px;
    --delta-section-gap: 64px;
  }
}

@media (max-width: 980px) {
  :root {
    --delta-col-gap: 0;
    --delta-page-pad-x: 28px;
    --delta-page-pad-y: 44px;
    --delta-section-gap: 56px;
    --delta-t-base: 17px;
  }
  /* Collapse the rail: full-width flow, sidenotes stack inline. */
  .page,
  delta-document {
    max-width: min(var(--delta-page-max), calc(var(--delta-measure) + 8ch));
    padding: var(--delta-page-pad-y) var(--delta-page-pad-x) calc(var(--delta-page-pad-y) * 2.5);
  }
  .sidenote {
    float: none;
    clear: none;
    width: auto;
    margin: 16px 0;
  }
  .bleed { margin-right: 0; }
  .widget-body { padding: 18px; }
  .widget-head, .widget-foot { padding: 12px 18px; }
}

@media (max-width: 640px) {
  :root {
    --delta-page-pad-x: 18px;
    --delta-page-pad-y: 30px;
    --delta-section-gap: 44px;
    --delta-block-gap: 22px;
    --delta-t-base: 16.5px;
  }
  .lede::first-letter { initial-letter: 2 1.5; -webkit-initial-letter: 2 1.5; }
  .widget-head { padding: 12px 14px; }
  .widget-body { padding: 14px; }
  .widget-foot { padding: 12px 14px; font-size: 12.5px; }
  .widget-head .ttl { margin-left: 0; display: block; font-size: 15.5px; }

  table.t { font-size: 14px; }
  table.t thead th { padding: 0 10px 8px; }
  table.t tbody td { padding: 9px 10px; }

  .code { padding: 14px 14px; font-size: 12.5px; }
  .code-head { font-size: 10px; }
}

@media (max-width: 380px) {
  :root { --delta-t-base: 16px; --delta-page-pad-x: 14px; }
}

@media print {
  body { background: white; color: black; }
  .widget-foot { display: none; }
  .widget { break-inside: avoid; }
}

} /* @layer delta.base */

/* bibliography.css — end-of-chapter references (.notes) and inline numeric
   citations (<delta-cite>/.cite with a .cite-pop hovercard on the shared
   .delta-pop shell). LIVE — DeltaBibliography (runtime/elements/bibliography.ts)
   lifts cited <delta-paper> entries into the list; DeltaCite (cite.ts) builds the
   inline "[1, 2]" and the hovercard. Tokens via var(--delta-*). */

@layer delta.components {

delta-bibliography { display: block; }
delta-paper { display: none; } /* lifted into <ol><li> by parent */

.notes {
  margin-top: var(--delta-section-gap);
  padding-top: 24px;
  border-top: var(--delta-hairline) solid var(--delta-ink);
  font-size: 13.5px;
  color: var(--delta-ink-soft);
  line-height: 1.6;
}
.notes h4 {
  font-family: var(--delta-sans);
  font-weight: 500;
  font-size: 11.5px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--delta-mute);
  margin: 0 0 14px;
}
.notes ol { padding-left: 22px; margin: 0; }
.notes li { margin-bottom: 8px; }
.notes li::marker {
  color: var(--delta-accent-ink);
  font-family: var(--delta-sans);
  font-size: 11px;
}
.notes .ext-link { overflow-wrap: anywhere; }  /* long DOIs/URLs don't overflow */

/* Inline numeric citation (<delta-cite>) — "[1, 2]" with a hovercard. */
delta-cite { display: inline; }
.cite {
  color: var(--delta-accent-ink);
  font-variant-numeric: tabular-nums;
  cursor: pointer;
}
.cite a { color: inherit; text-decoration: none; }
.cite a:hover { text-decoration: underline; }
.cite-missing { color: var(--delta-mute); }

/* Hovercard listing the cited reference(s) — built on the shared .delta-pop. */
.cite-pop {
  max-width: min(46ch, 92vw);
  font-size: 13.5px;
  line-height: 1.5;
}
.cite-pop-item { display: flex; gap: 8px; }
.cite-pop-item + .cite-pop-item {
  margin-top: 8px;
  padding-top: 8px;
  border-top: var(--delta-hairline) solid var(--delta-rule-soft);
}
.cite-pop-num {
  flex: none;
  color: var(--delta-accent-ink);
  text-decoration: none;
  font-variant-numeric: tabular-nums;
}
.cite-pop-num:hover { text-decoration: underline; }
.cite-pop-text { color: var(--delta-ink-soft); }

}

/* box.css — <box>, a generic callout / admonition block (DeltaBox,
   runtime/elements/box.ts). The runtime seeds --delta-accent from the `color`/`type`
   attribute (a named palette via [data-accent], or a hex/CSS color inline); with
   neither, the box inherits the document accent. Everything below derives from that
   single seed via color-mix — nothing is hardcoded, so it tracks light/dark and any
   hue. Scoped to the `delta-box` tag / its own classes; distinct from the theorem
   `.box` class and from the import-pack `.callout-*` chrome. */

@layer delta.components {

delta-box {
  /* Re-derive ink/soft from the seed for this subtree, mirroring the dark-mode
     derivation in base.css — so named + hex/custom colors behave identically and
     both track light/dark (--delta-ink / --delta-paper flip with mode). This also
     tints inner links/refs to match the box's hue. */
  --delta-accent-ink:  color-mix(in oklab, var(--delta-accent) 64%, var(--delta-ink));
  --delta-accent-soft: color-mix(in oklab, var(--delta-accent) 14%, var(--delta-paper));

  display: block;
  margin: var(--delta-block-gap) 0;
  padding: 14px 18px;
  border: var(--delta-hairline) solid color-mix(in oklab, var(--delta-accent) 30%, var(--delta-rule));
  border-left: 4px solid var(--delta-accent-ink);       /* stronger than the fill */
  border-radius: var(--delta-radius);
  background: var(--delta-accent-soft);                 /* pale tinted wash */
  color: color-mix(in oklab, var(--delta-ink) 88%, var(--delta-accent));
}

delta-box .box-heading {
  font-family: var(--delta-sans);
  font-weight: 650;
  font-size: 0.92em;
  letter-spacing: 0.01em;
  color: var(--delta-accent-ink);
  margin-bottom: 6px;
}

delta-box .box-body > :first-child { margin-top: 0; }
delta-box .box-body > :last-child  { margin-bottom: 0; }

@media print { delta-box { break-inside: avoid; } }

}

/* code.css — `<code lang>` highlighted display block + inline `<c>`. highlight.js
   runs at compile time (src/compiler/code.ts) and ships only class-based spans;
   this maps them onto Delta's code palette and styles the chrome the runtime
   builds (header, copy button, line-number gutter). Tokens via var(--delta-*). */

@layer delta.components {

/* inline literal code */
delta-c {
  font-family: var(--delta-mono);
  font-size: 0.86em;
  padding: 0.12em 0.4em;
  border-radius: var(--delta-radius-sm);
  background: var(--delta-surface-2);
  border: var(--delta-hairline) solid var(--delta-rule);
  color: var(--delta-ink);
  white-space: pre-wrap;
  word-break: break-word;
}

/* highlighted display block — a dark card. white-space:pre keeps it readable even
   before the runtime upgrades it (progressive enhancement). */
delta-code {
  display: block;
  margin: var(--delta-block-gap) 0;
  background: var(--delta-code-bg);
  color: var(--delta-code-fg);
  border-radius: var(--delta-radius-lg);
  overflow: hidden;
  box-shadow: var(--delta-shadow-code);
  font-family: var(--delta-mono);
  font-size: 13.5px;
  line-height: 1.62;
  white-space: pre;
}

/* header: language label + copy button */
.code-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  padding: 10px 16px;
  border-bottom: var(--delta-hairline) solid var(--delta-code-line);
  font-family: var(--delta-sans);
  white-space: normal;
}
.code-lang {
  font-size: 11px;
  letter-spacing: var(--delta-tracking-cap);
  text-transform: uppercase;
  color: var(--delta-code-mute);
}
.code-copy {
  font-family: var(--delta-sans);
  font-size: 11px;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  color: var(--delta-code-fg);
  background: color-mix(in oklab, var(--delta-code-fg) 12%, transparent);
  border: var(--delta-hairline) solid var(--delta-code-line);
  border-radius: var(--delta-radius-pill);
  padding: 4px 12px;
  cursor: pointer;
  transition: background var(--delta-dur-fast) var(--delta-ease);
}
.code-copy:hover { background: color-mix(in oklab, var(--delta-code-fg) 22%, transparent); }
.code-copy.is-copied {
  color: var(--delta-accent);
  border-color: color-mix(in oklab, var(--delta-accent) 50%, transparent);
}

/* body: line-number gutter + scrolling source */
.code-body {
  display: flex;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
}
.code-gutter {
  flex: none;
  padding: 16px 14px 16px 16px;
  text-align: right;
  color: var(--delta-code-mute);
  white-space: pre;
  user-select: none;
  -webkit-user-select: none;
  border-right: var(--delta-hairline) solid var(--delta-code-line);
}
.code-src {
  margin: 0;
  padding: 16px 18px;
  white-space: pre;
}
.code-src code { font-family: inherit; background: none; padding: 0; }

.code-cap {
  text-align: center;
  font-family: var(--delta-serif);
  font-size: 13.5px;
  line-height: 1.55;
  color: var(--delta-mute);
  gap: 12px;
  padding: 10px 16px;
  border-top: var(--delta-hairline) solid var(--delta-code-line);
}

.code-cap .lbl {
  font-family: var(--delta-sans);
  font-size: 11.5px;
  letter-spacing: var(--delta-tracking-cap);
  text-transform: uppercase;
  color: var(--delta-code-mute);
  margin-right: 0.6em;
  white-space: nowrap;
}

/* folded: the header bar stays; collapse.css hides the .collapse-body */
delta-code.is-collapsed { padding-bottom: 0; }

/* --- highlight.js classes → Delta code palette --------------------------------
   Reuses the oklch values base.css already uses for .code .k/.s/.n/.c/.f/.op. */
delta-code .hljs-keyword,
delta-code .hljs-selector-tag,
delta-code .hljs-name,
delta-code .hljs-tag { color: oklch(0.86 0.085 92); }

delta-code .hljs-string,
delta-code .hljs-regexp,
delta-code .hljs-symbol,
delta-code .hljs-meta .hljs-string { color: oklch(0.85 0.062 150); }

delta-code .hljs-number,
delta-code .hljs-literal { color: oklch(0.84 0.06 22); }

delta-code .hljs-comment,
delta-code .hljs-quote { color: oklch(0.58 0.012 75); font-style: italic; }

delta-code .hljs-title,
delta-code .hljs-title.function_,
delta-code .hljs-section,
delta-code .hljs-built_in { color: oklch(0.84 0.05 270); }

delta-code .hljs-attr,
delta-code .hljs-attribute,
delta-code .hljs-variable,
delta-code .hljs-template-variable,
delta-code .hljs-type,
delta-code .hljs-property,
delta-code .hljs-params { color: var(--delta-code-fg); }

delta-code .hljs-operator,
delta-code .hljs-punctuation,
delta-code .hljs-meta { color: oklch(0.86 0.01 75); }

delta-code .hljs-emphasis { font-style: italic; }
delta-code .hljs-strong { font-weight: 700; }
delta-code .hljs-deletion { color: var(--delta-warn); }
delta-code .hljs-addition { color: var(--delta-ok); }

}

/* collapse.css — collapsible sections & environments (`collapsible`/`collapsed`).
   The runtime (applyCollapsible in runtime/elements/shared.ts) turns the label — a
   section heading, a `.box-tag`, or a proof `.proof-lead` — into a `.collapse-toggle`
   and moves the body into a `.collapse-body`; folding sets `.is-collapsed` on the
   host. Here: the caret, the affordance, and the hide. Tokens via var(--delta-*). */

@layer delta.components {

.collapse-toggle {
  cursor: pointer;
  -webkit-user-select: none;
  user-select: none;
}
/* Headings & proof leads anchor the gutter sign (the .box-tag is already
   position:absolute and parks its sign inline instead). */
.collapse-toggle:not(.box-tag) {
  position: relative;
}
.collapse-toggle:focus-visible {
  outline: 2px solid var(--delta-accent-ink);
  outline-offset: 3px;
  border-radius: var(--delta-radius-sm);
}

/* Disclosure sign: "−" when open, "+" when folded. */
.collapse-toggle::before {
  content: "\2212"; /* − (minus) */
  color: var(--delta-mute);
  font-family: var(--delta-sans);
  font-weight: 600;
  transition: color var(--delta-dur-fast) var(--delta-ease);
}
.is-collapsed > .collapse-toggle::before {
  content: "+";
}
.collapse-toggle:hover::before {
  color: var(--delta-accent-ink);
}

/* Headings & proof leads: park the sign in the left gutter, out of the text
   flow — so it adds no inline space and can't open a flex gap (h2.section is a
   flex row). `right:100%` sits it just left of the text; centring on the label
   keeps it level with the text (a flex container resolves an abspos child's
   static position to the top, so `top:auto` would float it above the number). */
.collapse-toggle:not(.box-tag)::before {
  position: absolute;
  right: 100%;
  top: 50%;
  transform: translateY(-50%);
  margin-right: 0.3em;
  font-size: 0.8em;
  line-height: 1;
}

/* Box tag: a compact inline sign inside the floating pill. */
.box-tag.collapse-toggle::before {
  margin-right: 0.45em;
}

.is-collapsed > .collapse-body {
  display: none;
}

/* A folded box collapses to a compact bar that still carries its floating tag. */
.box.is-collapsed {
  padding-top: 12px;
  padding-bottom: 12px;
}

}

/* columns.css — side-by-side layout. <delta-columns> is a flex row; each direct
   <delta-column> child is a cell whose flex share comes from `--col-flex` (set by
   columns.ts from the author's `width`, default equal). Everything is scoped to
   `delta-columns > delta-column` so it never touches the table's `<column>` cells
   (which live under <row>/<header>, never as a direct child of <columns>). Tokens
   via var(--delta-*). */

@layer delta.components {

delta-columns {
  display: flex;
  gap: var(--delta-block-gap);
  align-items: start;
  margin: var(--delta-block-gap) 0;
}
delta-columns > delta-column {
  flex: var(--col-flex, 1 1 0); /* equal share unless columns.ts set a weight/basis */
  min-width: 0;                 /* let wide content (equations/code) shrink, not overflow */
}
delta-columns > delta-column > :first-child { margin-top: 0; }
delta-columns > delta-column > :last-child  { margin-bottom: 0; }

/* Vertical alignment of the columns (default: top). */
delta-columns[align="center"]  { align-items: center; }
delta-columns[align="bottom"]  { align-items: flex-end; }
delta-columns[align="stretch"] { align-items: stretch; }

/* Full-width: reclaim the reserved sidenote rail, like .bleed. */
delta-columns[wide] { margin-right: calc(-1 * (var(--delta-col-gap) + var(--delta-margin-w))); }

@media (max-width: 980px) {
  delta-columns[wide] { margin-right: 0; }   /* rail already collapsed */
}
@media (max-width: 640px) {
  /* Stack on narrow screens. This resets the per-column share (the weight/basis is
     published as --col-flex, not inline `flex`, so this rule wins cleanly). */
  delta-columns { flex-direction: column; }
  delta-columns > delta-column { flex: 0 0 auto; }
}

}

/* figure.css (+ video) — framed media + caption shared by <delta-figure>,
   <delta-video> and <delta-youtube>: .figure/.video (layout), .figure-frame/
   .video-frame (the box), .video-media (the player), .figure-cap/.video-cap.
   PARTIAL: <delta-youtube> emits an iframe.video-media (styled here); the full
   figure/video runtime is staged. Tokens via var(--delta-*). */

@layer delta.components {

delta-figure,
delta-interactive { display: block; }
delta-video,
delta-youtube,
delta-audio { display: block; }
delta-caption { display: block; } 

/* Figures and videos share the outer layout and caption — only how the media
   sits in the frame differs (a figure mats + centres; a video fills). */
.figure,
.video,
 .interactive {
  margin: 36px 0 var(--delta-block-gap);
  display: flex;
  flex-direction: column;
  gap: 14px;
}

/* Shared framed box: border, radius, shadow; clip media to the corners. */
.figure-frame,
.video-frame, 
.interactive-frame {
  background: var(--delta-surface-1);
  border: var(--delta-hairline) solid var(--delta-rule);
  border-radius: var(--delta-radius);
  overflow: hidden;
  box-shadow: var(--delta-shadow);
}

/* A figure mats its visual and centres it. */
.figure-frame, .interactive-frame {
  padding: 12px;
  text-align: center; /* centre inline / inline-block media */
}
/* Centre block-level media too (img/svg are display:block per base.css). */
.figure-frame > * {
  margin-inline: auto;
}

/* A video fills the frame edge-to-edge. */
.video-media {
  display: block;
  width: 100%;
  height: auto;
  border: 0;
}
/* YouTube iframes have no intrinsic ratio — give them a 16:9 box. */
iframe.video-media {
  aspect-ratio: 16 / 9;
}

/* file:// fallback (media.ts): a 16:9 thumbnail that opens the video on youtube.com,
   since a referrer-less file:// page can't embed the player (error 153). A play badge
   over the thumbnail signals it's a video. */
a.yt-facade {
  position: relative;
  display: block;
  width: 100%;
  aspect-ratio: 16 / 9;
  background: oklch(0.18 0.006 75);
  text-decoration: none;
}
.yt-facade img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}
.yt-play {
  position: absolute;
  top: 50%;
  left: 50%;
  width: 68px;
  height: 48px;
  transform: translate(-50%, -50%);
  border-radius: 14px;
  background: rgba(18, 18, 18, 0.78);
  transition: background var(--delta-dur-fast) var(--delta-ease);
}
.yt-play::after {
  content: "";
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-40%, -50%);
  border: solid transparent;
  border-width: 9px 0 9px 15px;
  border-left-color: #fff;
}
.yt-facade:hover .yt-play,
.yt-facade:focus-visible .yt-play { background: #f00; }
.yt-facade:focus-visible { outline: 2px solid var(--delta-accent-ink); outline-offset: 2px; }

/* Audio reuses the framed box; the native control bar fills the width. */
.audio-media {
  display: block;
  width: 100%;
}
.video-missing {
  display: block;
  padding: 24px;
  text-align: center;
  font-family: var(--delta-sans);
  font-size: 13px;
  color: var(--delta-mute);
}

/* Shared caption, centred under the media; the "Fig./Video N" label is an
   inline prefix before the centred text. */
.figure-cap,
.video-cap, 
.interactive-cap {
  text-align: center;
  font-family: var(--delta-serif);
  font-size: 13.5px;
  line-height: 1.55;
  color: var(--delta-mute);
}
.figure-cap .lbl,
.video-cap .lbl,
.interactive-cap .lbl {
  font-family: var(--delta-sans);
  font-size: 11.5px;
  letter-spacing: var(--delta-tracking-cap);
  text-transform: uppercase;
  color: var(--delta-ink);
  margin-right: 0.6em;
  white-space: nowrap;
}

}

/* floating.css — <delta-floating>: a fixed corner button that expands into a
   floating panel (DeltaFloating, runtime/elements/floating.ts). The button (.floating-fab)
   is pinned bottom-right; the panel composes on top of the shared .delta-pop bubble
   (popover.css) — Delta.popover sets its position and toggles visibility — so this only
   adds sizing, the header (.floating-hd / .floating-x) and the scrollable body
   (.floating-body). Tokens via var(--delta-*); modeled on the staged .twk-* chrome. */

@layer delta.components {

/* The element itself takes no layout box; its only in-flow child (the FAB) is fixed. */
delta-floating { display: contents; }

/* Floating action button — a pill pinned to the bottom-right corner. */
.floating-fab {
  position: fixed;
  right: 16px;
  bottom: 16px;
  z-index: 50;
  display: inline-flex;
  align-items: center;
  gap: 0.5em;
  appearance: none;
  padding: 9px 15px;
  border: var(--delta-hairline) solid var(--delta-rule);
  border-radius: var(--delta-radius-pill);
  background: var(--delta-surface-1);
  color: var(--delta-ink);
  font-family: var(--delta-sans);
  font-size: 13px;
  font-weight: 600;
  letter-spacing: 0.01em;
  cursor: pointer;
  box-shadow: var(--delta-shadow-lift);
  transition: background var(--delta-dur-fast) var(--delta-ease),
              color var(--delta-dur-fast) var(--delta-ease),
              opacity var(--delta-dur-fast) var(--delta-ease);
}
.floating-fab:hover {
  background: var(--delta-surface-2);
  color: var(--delta-accent-ink);
}
.floating-fab[aria-expanded="true"] { opacity: 0.55; }
.floating-icon { font-size: 1.05em; line-height: 1; }

/* The panel rides on .delta-pop (surface/border/radius/shadow/caret/entrance from
   popover.css); widen it, cap its height and let the body scroll. `display` is set
   ONLY in the open states — an unconditional `display` here would override the UA
   `[popover]:not(:popover-open){display:none}` rule (and popover.css's fallback
   `.delta-pop:not([popover])`), leaving the panel permanently visible so close/toggle
   appear to do nothing. */
.floating-panel.delta-pop {
  width: min(320px, 92vw);
  max-width: none;
  max-height: calc(100vh - 32px);
  padding: 0;
  flex-direction: column;
  overflow: hidden;
}
.floating-panel.delta-pop:popover-open,
.floating-panel.delta-pop.is-open:not([popover]) {
  display: flex;
}

.floating-hd {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  padding: 10px 10px 10px 16px;
  border-bottom: var(--delta-hairline) solid var(--delta-rule-soft);
  user-select: none;
}
.floating-title {
  font-family: var(--delta-sans);
  font-size: 11px;
  font-weight: 600;
  letter-spacing: var(--delta-tracking-cap);
  text-transform: uppercase;
  color: var(--delta-mute);
}
.floating-x {
  flex: none;
  appearance: none;
  border: 0;
  background: transparent;
  color: var(--delta-mute);
  width: 24px;
  height: 24px;
  border-radius: var(--delta-radius-sm);
  font-size: 16px;
  line-height: 1;
  cursor: pointer;
  transition: background var(--delta-dur-fast) var(--delta-ease),
              color var(--delta-dur-fast) var(--delta-ease);
}
.floating-x:hover {
  background: var(--delta-surface-2);
  color: var(--delta-ink);
}

.floating-body {
  padding: 8px 14px 14px;
  overflow-y: auto;
  min-height: 0;
}

/* A toc nested in the panel sheds its own card chrome (border/bg/padding live in
   toc.css) so the panel doesn't double up the surface. */
.floating-body .toc {
  margin: 0;
  padding: 0;
  border: 0;
  background: transparent;
}
.floating-body .toc-title { display: none; } /* the panel header already names it */

@media print {
  .floating-fab,
  .floating-panel { display: none !important; }
}

}

/* frontmatter.css — math-paper front matter: <abstract> plus the labeled metadata
   (<keywords>, <msc>, the publication dates, <acknowledgements>, <funding>). The
   labels are composed at runtime (frontmatter.ts) via t(); this styles the result.
   The metadata rules key off the `.fm-line` / `.fm-block` classes the runtime adds
   (never bare `delta-date` etc.), so a presentation cover's <date> is never caught.
   Tokens via var(--delta-*). */

@layer delta.components {

/* -- Abstract: a centered, narrower, justified block under a small heading -------- */
delta-abstract {
  display: block;
  max-width: 34em;
  margin: var(--delta-section-gap) auto var(--delta-block-gap);
}
.abstract-label {
  text-align: center;
  font-family: var(--delta-sans);
  font-size: 11px;
  font-weight: 600;
  letter-spacing: var(--delta-tracking-cap);
  text-transform: uppercase;
  color: var(--delta-mute);
  margin-bottom: 10px;
}
.abstract-body {
  text-align: justify;
  hyphens: auto;
  font-size: 0.94em;
  line-height: var(--delta-leading);
  color: var(--delta-ink-soft);
}
.abstract-body > :first-child { margin-top: 0; }
.abstract-body > :last-child  { margin-bottom: 0; }

/* -- Compact labeled lines: keywords / MSC / dates, centered under the abstract --- */
.fm-line {
  display: block;
  max-width: 38em;
  margin: 6px auto 0;
  text-align: center;
  font-size: 0.82em;
  line-height: 1.5;
  color: var(--delta-mute);
  text-wrap: pretty;
}
.fm-line:first-of-type { margin-top: 14px; }
.fm-label {
  font-family: var(--delta-sans);
  font-weight: 600;
  color: var(--delta-ink-soft);
}

/* -- Small blocks: acknowledgements / funding, with an italic run-in label -------- */
.fm-block {
  display: block;
  margin: var(--delta-block-gap) 0 0;
  font-size: 0.9em;
  line-height: var(--delta-leading);
  color: var(--delta-ink-soft);
}
.fm-block .fm-label {
  font-family: var(--delta-serif);
  font-style: italic;
  font-weight: 600;
  color: var(--delta-ink);
  margin-right: 0.3em;
}

}

/* hint.css — inline click-to-reveal hint: a quiet .hint-trigger flows in the
   prose; clicking reveals the hint in the shared .delta-pop bubble
   (components/popover.css), driven by Delta.popover (runtime/utils.ts). Only the
   trigger styling lives here. Tokens via var(--delta-*). */

@layer delta.components {

delta-hint { display: inline; }

/* Trigger: a small, .ref-like inline affordance. */
.hint-trigger {
  display: inline-flex;
  align-items: baseline;
  gap: 4px;
  font-family: var(--delta-sans);
  font-size: 0.82em;
  line-height: 1;
  color: var(--delta-accent-ink);
  background: none;
  border: 0;
  padding: 0 1px;
  cursor: pointer;
  border-bottom: 1px dashed color-mix(in oklab, var(--delta-accent-ink) 50%, transparent);
  transition: background var(--delta-dur-fast) var(--delta-ease),
              border-color var(--delta-dur-fast) var(--delta-ease);
}
.hint-trigger:hover {
  background: color-mix(in oklab, var(--delta-accent-soft) 60%, transparent);
  border-color: var(--delta-accent-ink);
}
.hint-trigger .hint-marker { font-size: 0.9em; }

}

/* link.css — <delta-link>: an underlined anchor (.ext-link) that, when off-site,
   also carries the external-link icon (.ext-icon) and a screen-reader new-tab
   hint (.ext-sr). STAGED — link.js builds the inner <a>; styling lives here. */

@layer delta.components {

delta-link { display: inline; }

.ext-link {
  color: var(--delta-accent-ink);
  text-decoration: underline;
  text-decoration-color: color-mix(in oklab, var(--delta-accent-ink) 40%, transparent);
  text-decoration-thickness: 1px;
  text-underline-offset: 2px;
  transition: text-decoration-color var(--delta-dur-fast) var(--delta-ease);
}
.ext-link:hover { text-decoration-color: var(--delta-accent-ink); }

/* Inline icon — overrides base.css `svg { display: block }`. */
.ext-icon {
  display: inline-block;
  width: 0.8em;
  height: 0.8em;
  margin-left: 0.15em;
  vertical-align: -0.08em;
}

/* Visually-hidden "(opens in new tab)" hint, available to screen readers. */
.ext-sr {
  position: absolute;
  width: 1px;
  height: 1px;
  margin: -1px;
  padding: 0;
  overflow: hidden;
  clip: rect(0 0 0 0);
  white-space: nowrap;
  border: 0;
}

/* In print, spell out the URL and drop the (meaningless) icon. */
@media print {
  .ext-link::after {
    content: " (" attr(href) ")";
    font-size: 0.85em;
    color: var(--delta-mute);
    word-break: break-all;
  }
  .ext-icon { display: none; }
}

}

/* list.css — ordered & unordered lists. DeltaList (runtime/elements/list.ts)
   converts <delta-list>/<delta-item> into semantic <ol class="delta-list">
   with <li class="delta-list-item"> and records the marker style on
   data-marker. Markers are drawn here with CSS counters + ::before (not native
   ::marker) so they can take Delta's accent ink, tabular figures and a tidy
   right-aligned gutter. All knobs are --delta-list-* tokens scoped to the list,
   so a theme can restyle every list by overriding them. Tokens via var(--delta-*). */

@layer delta.components {

/* Pre-upgrade / no-JS fallback: show the raw tags as a plain list. */
delta-list { display: block; margin: var(--delta-block-gap) 0; }
delta-item { display: list-item; margin-left: 1.5em; }

.delta-list {
  /* -- tunable knobs (override in a theme to restyle every list) -- */
  --delta-list-indent:   2.1em;                 /* marker gutter width   */
  --delta-list-gap:      0.7em;                 /* marker → text spacing */
  --delta-list-item-gap: 0.5em;                 /* vertical gap per item */
  --delta-list-marker:   var(--delta-accent-ink);
  --delta-list-bullet:   var(--delta-accent);

  margin: var(--delta-block-gap) 0;
  padding: 0;
  list-style: none;
  counter-reset: delta-item;                    /* each list numbers from 1 */
}

/* Nested lists tuck in tighter and drop the surrounding block gap. */
.delta-list .delta-list { margin: var(--delta-list-item-gap) 0 0; }

.delta-list-item {
  position: relative;
  margin: 0 0 var(--delta-list-item-gap);
  padding-left: var(--delta-list-indent);
  line-height: var(--delta-leading);
  counter-increment: delta-item;
  text-wrap: pretty;
}
.delta-list-item:last-child { margin-bottom: 0; }
/* Block children (paragraphs, nested lists, equations) shed their outer gaps. */
.delta-list-item > :first-child { margin-top: 0; }
.delta-list-item > :last-child  { margin-bottom: 0; }

/* -- Marker base ------------------------------------------------------- */
.delta-list-item::before {
  position: absolute;
  left: 0;
  width: calc(var(--delta-list-indent) - var(--delta-list-gap));
  font-family: var(--delta-sans);
  color: var(--delta-list-marker);
}

/* -- Ordered markers: numbers / letters, right-aligned against the text -- */
.delta-list[data-marker="decimal"]     > .delta-list-item::before { content: counter(delta-item, decimal) "."; }
.delta-list[data-marker="alpha"]       > .delta-list-item::before { content: counter(delta-item, lower-alpha) "."; }
.delta-list[data-marker="alpha-upper"] > .delta-list-item::before { content: counter(delta-item, upper-alpha) "."; }
.delta-list[data-marker="roman"]       > .delta-list-item::before { content: counter(delta-item, lower-roman) "."; }
.delta-list[data-marker="roman-upper"] > .delta-list-item::before { content: counter(delta-item, upper-roman) "."; }

:is(
  .delta-list[data-marker="decimal"],
  .delta-list[data-marker="alpha"],
  .delta-list[data-marker="alpha-upper"],
  .delta-list[data-marker="roman"],
  .delta-list[data-marker="roman-upper"]
) > .delta-list-item::before {
  top: 0;
  text-align: right;
  font-size: 0.9em;
  font-weight: 500;
  font-variant-numeric: tabular-nums lining-nums;
  letter-spacing: 0.01em;
}

/* -- Unordered: a filled accent dot on the first line ------------------ */
.delta-list[data-marker="bullet"] > .delta-list-item::before {
  content: "";
  width: 0.4em;
  height: 0.4em;
  left: 0.25em;
  top: calc(var(--delta-list-bullet-y, 0.5) * var(--delta-leading) * 1em);
  margin-top: -0.2em;
  border-radius: 50%;
  background: var(--delta-list-bullet);
}
/* Nested unordered lists vary the bullet so depth reads at a glance:
   level 2 → a hollow ring, level 3+ → a short dash. */
.delta-list .delta-list[data-marker="bullet"] > .delta-list-item::before {
  background: transparent;
  box-shadow: inset 0 0 0 1.4px var(--delta-list-bullet);
}
.delta-list .delta-list .delta-list[data-marker="bullet"] > .delta-list-item::before {
  width: 0.5em;
  height: 2px;
  margin-top: -1px;
  border-radius: 1px;
  box-shadow: none;
  background: var(--delta-list-bullet);
}

/* -- Unordered: en-dash marker ---------------------------------------- */
.delta-list[data-marker="dash"] > .delta-list-item::before {
  content: "–";
  top: 0;
  left: 0.1em;
  color: var(--delta-list-bullet);
}

/* -- Unordered: no marker (flush list) -------------------------------- */
.delta-list[data-marker="none"] { --delta-list-indent: 0; }
.delta-list[data-marker="none"] > .delta-list-item::before { content: none; }

}

/* Math blocks. KaTeX HTML is rendered at compile time (src/compiler/math.ts);
   `num` is compile-time data on the tag, so equation numbers are pure CSS. */

@layer delta.components {

  delta-equation,
  delta-equations,
  delta-math {
    display: block;
    position: relative;
    margin: var(--delta-block-gap) 0;
  }

  delta-equation[num]::after,
  delta-equations[num]::after {
    content: "(" attr(num) ")";
    position: absolute;
    right: 0;
    top: 50%;
    transform: translateY(-50%);
    color: var(--delta-mute);
    font-variant-numeric: tabular-nums;
  }

  /* Inside a popover preview (.delta-pop, e.g. a <ref> card) the number already
     shows in the bubble's header label, and the narrow bubble makes the absolute
     number overlap the equation — so drop the inline number there. Same specificity
     as the rule above, so it must stay after it to win. */
  .delta-pop delta-equation[num]::after,
  .delta-pop delta-equations[num]::after {
    content: none;
  }

  delta-equation .katex-display,
  delta-equations .katex-display,
  delta-math .katex-display { margin: 0; }

  delta-m { display: inline; }

}

/* popover.css — the shared anchored-bubble shell, driven by Delta.popover
   (src/runtime/utils.ts). The controller sets top/left/--arrow-x and toggles
   .is-above (caret side) and, in the no-Popover-API fallback, .is-open.
   Components (.xref-pop, .cite-pop, hint bubbles, …) add their own content
   classes on top for padding/layout. Tokens via var(--delta-*). */

@layer delta.components {

.delta-pop {
  position: fixed;          /* Delta.popover sets top/left */
  margin: 0;
  inset: auto;
  z-index: 60;
  max-width: min(34ch, 92vw);
  padding: 12px 15px;
  font-family: var(--delta-serif);
  font-size: 15px;
  line-height: 1.45;
  color: var(--delta-ink);
  background: var(--delta-surface-1);
  border: var(--delta-hairline) solid var(--delta-rule);
  border-radius: var(--delta-radius-lg);
  box-shadow: var(--delta-shadow-lift);
}
.delta-pop > :first-child { margin-top: 0; }
.delta-pop > :last-child  { margin-bottom: 0; }

/* Caret pointing back at the trigger (--arrow-x set by Delta.popover). */
.delta-pop::after {
  content: "";
  position: absolute;
  left: var(--arrow-x, 16px);
  width: 10px;
  height: 10px;
  background: var(--delta-surface-1);
  border: var(--delta-hairline) solid var(--delta-rule);
  transform: translateX(-50%) rotate(45deg);
}
.delta-pop::after          { top: -6px; border-right: 0; border-bottom: 0; }     /* below trigger */
.delta-pop.is-above::after { top: auto; bottom: -6px; border-left: 0; border-top: 0; }

/* Entrance (Popover-API path and the .is-open fallback both replay it). */
.delta-pop:popover-open,
.delta-pop.is-open { animation: delta-pop-in var(--delta-dur) var(--delta-ease); }
@keyframes delta-pop-in {
  from { opacity: 0; transform: translateY(-4px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* Fallback when the Popover API is unavailable: shown only via .is-open. */
.delta-pop:not([popover]) { display: none; }
.delta-pop.is-open:not([popover]) { display: block; }

@media print { .delta-pop { display: none; } }

}

/* reference.css — <delta-ref>: a cross-reference that previews its target in a
   hovercard (.xref-pop) built on the shared .delta-pop shell (base.css), instead
   of jumping. STAGED — reference.js builds the inner <a> and the card. The trigger
   reuses the dashed .ref look. Tokens via var(--delta-*). */

@layer delta.components {

delta-ref { display: inline; }

/* The inline trigger — a self-contained, .ref-like affordance (it's a <button>,
   so it resets the native chrome and inherits the prose font). */
.xref {
  font: inherit;
  color: var(--delta-accent-ink);
  background: none;
  border: 0;
  border-bottom: 1px dashed color-mix(in oklab, var(--delta-accent-ink) 50%, transparent);
  padding: 0 1px;
  cursor: pointer;
  transition: background var(--delta-dur-fast) var(--delta-ease),
              border-color var(--delta-dur-fast) var(--delta-ease);
}
.xref:hover {
  background: color-mix(in oklab, var(--delta-accent-soft) 60%, transparent);
  border-color: var(--delta-accent-ink);
}

/* An in-math \ref marker (wireMathRefs upgrades the \htmlData span the compiler
   bakes into KaTeX output). Accent color only — no underline, which would collide
   with math symbols (e.g. sitting on an equals sign via \stackrel); the hover wash
   provides the click affordance. Sized by the surrounding math (a \stackrel script
   keeps its scriptsize). */
.katex .math-xref {
  color: var(--delta-accent-ink);
  cursor: pointer;
  border-radius: var(--delta-radius-sm);
  transition: background var(--delta-dur-fast) var(--delta-ease);
}
.katex .math-xref:hover {
  background: color-mix(in oklab, var(--delta-accent-soft) 60%, transparent);
}

/* Card content chrome on top of the shared .delta-pop shell. */
.xref-pop { width: max-content; max-width: min(40ch, 92vw); padding: 10px 13px; }

.xref-pop-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  margin-bottom: 6px;
}
.xref-pop-label {
  font-family: var(--delta-sans);
  font-size: 11px;
  letter-spacing: var(--delta-tracking-cap);
  text-transform: uppercase;
  color: var(--delta-mute);
}
.xref-go {
  flex: none;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 24px; height: 24px;
  padding: 0;
  color: var(--delta-accent-ink);
  background: var(--delta-accent-soft);
  border: var(--delta-hairline) solid var(--delta-rule);
  border-radius: var(--delta-radius);
  cursor: pointer;
  transition: background var(--delta-dur-fast) var(--delta-ease);
}
.xref-go:hover { background: var(--delta-surface-2); }
.xref-go svg { width: 15px; height: 15px; display: block; }

.xref-pop-body {
  max-height: 40vh;
  overflow: auto;
  font-size: 15px;
  line-height: 1.5;
}
.xref-pop-body > :first-child { margin-top: 0; }
.xref-pop-body > :last-child  { margin-bottom: 0; }
.xref-pop-body img { max-height: 30vh; width: auto; }

/* Flatten a cloned theorem .box so it reads as plain preview content
   (no floating pill, border, or shadow inside the small card). */
.xref-pop-body .box {
  margin: 0; padding: 0; border: 0; box-shadow: none; background: none;
}
.xref-pop-body .box-tag {
  position: static; margin: 0 0 4px; transform: none;
}
.xref-pop-body :is(h2, h3, h4) { margin: 0; }

/* Brief accent flash on the target when the reader jumps to it. */
.is-xref-target { animation: xref-flash 2s var(--delta-ease); border-radius: var(--delta-radius); }
@keyframes xref-flash {
  0%, 100% { box-shadow: 0 0 0 0 transparent; background: transparent; }
  12%      { box-shadow: 0 0 0 4px var(--delta-accent-soft); background: var(--delta-accent-soft); }
}

}

/* sidenote.css — inline marginalia, appearance only. LIVE: DeltaSidenote adds
   .sidenote; positioning (float into the reserved rail, and the narrow-viewport
   collapse) lives in base.css's page layout, since the rail is a page-grid
   primitive like .bleed. Tokens via var(--delta-*). */

@layer delta.components {

delta-sidenote { display: block; }

.sidenote {
  font-family: var(--delta-serif);
  font-size: 13.5px;
  line-height: 1.5;
  color: var(--delta-ink-soft);
  border-left: 2px solid var(--delta-accent);
  padding: 2px 0 2px 14px;
}
.sidenote .n {
  font-family: var(--delta-sans);
  font-size: 10.5px;
  letter-spacing: var(--delta-tracking-cap);
  text-transform: uppercase;
  color: var(--delta-accent-ink);
  display: block;
  margin-bottom: 6px;
}

}

/* Presentation deck — chrome for `<document type="presentation">`. Every rule is
   gated on `:root[data-type="presentation"]` (the hook emit.ts writes on <html>),
   so this ships in CORE_CSS like every component but only takes effect for decks —
   the same "ships always, applies on match" pattern as floating.css / collapse.css.

   Deck tokens (--delta-slide-*, --delta-t-slide-title, --delta-deck-bg) come from
   themes/presentation.css. Paging is progressive: the controller (runtime/deck.ts)
   marks the root `.deck-js` and the active slide `.is-active`. The hide-inactive
   rule is gated on `.deck-js`, so with JS off every slide stays visible (fallback). */

@layer delta.components {
  :root[data-type="presentation"] body {
    background: var(--delta-deck-bg);
  }

  /* Escape the article measure + sidenote rail: the deck is full-bleed.
     `overflow-x: clip` keeps a deck from ever scrolling sideways (clip, not hidden,
     leaves vertical scrolling intact for a tall slide). */
  :root[data-type="presentation"] delta-document {
    max-width: none;
    margin: 0;
    padding: 0;
    overflow-x: clip;
  }

  /* The in-body copy of the document title would float above every slide; the
     page <title> already covers the browser tab, so drop it in deck mode. */
  :root[data-type="presentation"] delta-document > delta-title {
    display: none;
  }

  /* Each slide fills the viewport: title at the top, body centered. */
  :root[data-type="presentation"] delta-slide {
    display: flex;
    flex-direction: column;
    min-height: 100dvh;
    box-sizing: border-box;
    padding: var(--delta-slide-pad);
  }
  :root[data-type="presentation"] .slide-title {
    margin: 0;
    font-size: var(--delta-t-slide-title);
    line-height: var(--delta-leading-tight);
    color: var(--delta-accent-ink);
  }
  /* Content slides (not the cover / divider, which have their own treatments) get a
     short accent kicker rule under the title. Suppressed when <progress/> is on — the
     progress separator line below the title already serves as the rule there. */
  :root[data-type="presentation"]
    delta-slide:not([cover="true"]):not([divider="true"]) .slide-title::after {
    content: "";
    display: block;
    width: var(--delta-kicker-w);
    height: var(--delta-kicker-h);
    margin-top: clamp(10px, 1.6vmin, 18px);
    border-radius: var(--delta-radius-pill);
    background: var(--delta-kicker-color);
  }
  :root[data-type="presentation"].deck-progress-on
    delta-slide:not([cover="true"]):not([divider="true"]) .slide-title::after {
    display: none;
  }
  /* Normal block flow (NOT a flex container — flex would blockify inline children
     like inline math or <c>, forcing each onto its own full-width line). `margin:
     auto` centers it both ways: horizontally within the measure, and vertically in
     the space the flex-column slide leaves below the title/rule. */
  :root[data-type="presentation"] .slide-body {
    width: 100%;
    max-width: var(--delta-slide-max);
    margin: auto;
  }

  /* Section → divider slide. In a deck a section is a transparent group: its box
     disappears (`display: contents`) so the divider slide DeltaSection prepends and
     the section's own child slides flow as ordinary deck slides. */
  :root[data-type="presentation"]
    :is(delta-chapter, delta-section, delta-subsection, delta-subsubsection) {
    display: contents;
  }

  /* The divider itself: a slide whose only content is its title, centered. It's
     inverted — a dark accent-ink full-bleed slide with paper text — so a section
     break reads like a chapter page, distinct from the content slides around it. */
  :root[data-type="presentation"] delta-slide[divider="true"] {
    justify-content: center;
    text-align: center;
    background: var(--delta-divider-bg);
    color: var(--delta-divider-ink);
  }
  :root[data-type="presentation"] delta-slide[divider="true"] .slide-title {
    font-size: var(--delta-t-divider);
    color: var(--delta-divider-ink);
  }
  :root[data-type="presentation"] delta-slide[divider="true"] :is(.slide-rule, .slide-body) {
    display: none;
  }

  /* Cover / title slide (`<cover>` → `<slide cover="true">`). The deck's front page:
     the title sits big and centered with the subtitle/author/affiliation/event/date
     fields stacked under it. The fields are plain tags styled here by name. */
  :root[data-type="presentation"] delta-slide[cover="true"] {
    justify-content: center;
    text-align: center;
    background: var(--delta-cover-bg);
  }
  :root[data-type="presentation"] delta-slide[cover="true"] .slide-rule { display: none; }
  :root[data-type="presentation"] delta-slide[cover="true"] .slide-title {
    font-size: var(--delta-t-cover-title);
    color: var(--delta-accent-ink);
  }
  /* A short accent rule under the cover title, centered. */
  :root[data-type="presentation"] delta-slide[cover="true"] .slide-title::after {
    content: "";
    display: block;
    width: var(--delta-kicker-w);
    height: var(--delta-kicker-h);
    margin: clamp(14px, 2vmin, 22px) auto 0;
    border-radius: var(--delta-radius-pill);
    background: var(--delta-kicker-color);
  }
  :root[data-type="presentation"] delta-slide[cover="true"] .slide-body {
    margin: 0.5em auto 0; /* sit just under the title rather than centering on its own */
  }
  :root[data-type="presentation"] delta-slide[cover="true"] delta-subtitle {
    display: block;
    font-size: var(--delta-t-cover-subtitle);
    color: var(--delta-ink-soft);
  }
  :root[data-type="presentation"] delta-slide[cover="true"] delta-author {
    display: block;
    margin-top: 1.4em;
    font-size: 1.15em;
    font-weight: 500;
  }
  :root[data-type="presentation"] delta-slide[cover="true"] delta-affiliation {
    display: block;
    margin-top: 0.15em;
    font-size: 0.8em;
    color: var(--delta-mute);
  }
  :root[data-type="presentation"] delta-slide[cover="true"] delta-event {
    display: block;
    margin-top: 1.4em;
    color: var(--delta-ink-soft);
  }
  :root[data-type="presentation"] delta-slide[cover="true"] delta-date {
    display: block;
    margin-top: 0.15em;
    font-size: 0.8em;
    color: var(--delta-mute);
  }

  /* Progress bar — opt-in via a <progress/> marker (which itself renders nothing).
     The marker turns on `.deck-progress-on`; the separator line under each slide
     title then doubles as the deck progress indicator. Its fill reads the global
     `--deck-progress` the controller sets on the root (0–1). */
  :root[data-type="presentation"] delta-progress { display: none; }

  :root[data-type="presentation"] .slide-rule { display: none; }
  :root[data-type="presentation"].deck-progress-on .slide-rule {
    display: block;
    height: var(--delta-progress-h);
    margin: clamp(12px, 2.2vmin, 24px) 0;
    background: var(--delta-progress-track);
    border-radius: var(--delta-radius-pill);
    overflow: hidden;
  }
  :root[data-type="presentation"].deck-progress-on .slide-rule-fill {
    display: block;
    height: 100%;
    width: calc(var(--deck-progress, 0) * 100%);
    background: var(--delta-progress-fill);
  }
  /* Grow the bar from the previous slide's fraction to the current one every time
     a slide becomes active, so the fill is visibly seen moving (and receding on the
     way back). A keyframe, not a transition: the incoming slide was display:none, so
     a width transition wouldn't fire — but a keyframe restarts when it's shown. */
  :root[data-type="presentation"].deck-progress-on delta-slide.is-active .slide-rule-fill {
    animation: delta-deck-bar var(--delta-progress-dur) var(--delta-slide-ease);
  }
  @keyframes delta-deck-bar {
    from { width: calc(var(--deck-progress-prev, 0) * 100%); }
    to   { width: calc(var(--deck-progress, 0) * 100%); }
  }

  /* Paging (JS on): show only the active slide. */
  :root[data-type="presentation"].deck-js delta-slide:not(.is-active) {
    display: none;
  }

  /* Fragments (JS on): an element marked reveal="true" stays hidden until the
     controller adds .is-revealed, then fades in. opacity+visibility reserves its
     layout box, so revealing doesn't reflow the rest of the slide. Gated on
     .deck-js, so with JS off the reveal attribute is inert and all show. */
  :root[data-type="presentation"].deck-js delta-slide [reveal="true"] {
    transition: opacity var(--delta-reveal-dur) var(--delta-slide-ease);
  }
  :root[data-type="presentation"].deck-js delta-slide [reveal="true"]:not(.is-revealed) {
    opacity: 0;
    visibility: hidden;
  }

  /* Enter transition: a gentle fade-in for the incoming slide (enter-only — the
     outgoing slide is display:none). Opacity only, so it never shifts layout. */
  :root[data-type="presentation"] delta-slide.is-active {
    animation: delta-deck-fade var(--delta-slide-dur) var(--delta-slide-ease);
  }
  @keyframes delta-deck-fade {
    from { opacity: 0; }
    to   { opacity: 1; }
  }
  @media (prefers-reduced-motion: reduce) {
    :root[data-type="presentation"] delta-slide.is-active,
    :root[data-type="presentation"] delta-slide.is-active .slide-rule-fill {
      animation: none;
    }
    :root[data-type="presentation"].deck-js delta-slide [reveal="true"] {
      transition: none;
    }
  }

  /* Overlay touch controls (JS on): a subtle prev / counter / next cluster pinned
     bottom-centre so a deck is navigable without a keyboard. Built by deck.ts; faint
     by default, full opacity on hover/focus/tap, and a touch (no-hover) bump. Sits
     clear of a bottom-right <floating> FAB. */
  :root[data-type="presentation"].deck-js .deck-controls {
    position: fixed;
    left: 50%;
    bottom: 14px;
    transform: translateX(-50%);
    z-index: 50;
    display: flex;
    align-items: center;
    gap: 8px;
    opacity: 0.45;
    transition: opacity var(--delta-dur) var(--delta-ease);
  }
  :root[data-type="presentation"].deck-js .deck-controls:hover,
  :root[data-type="presentation"].deck-js .deck-controls:focus-within,
  :root[data-type="presentation"].deck-js .deck-controls:active {
    opacity: 1;
  }
  @media (hover: none) and (pointer: coarse) {
    :root[data-type="presentation"].deck-js .deck-controls { opacity: 0.7; }
  }

  .deck-nav {
    appearance: none;
    width: 42px;
    height: 42px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    border: var(--delta-hairline) solid var(--delta-rule);
    border-radius: 50%;
    background: var(--delta-surface-1);
    color: var(--delta-ink);
    font-family: var(--delta-sans);
    font-size: 22px;
    line-height: 1;
    cursor: pointer;
    box-shadow: var(--delta-shadow-lift);
    transition: background var(--delta-dur-fast) var(--delta-ease),
                color var(--delta-dur-fast) var(--delta-ease);
  }
  .deck-nav:hover {
    background: var(--delta-surface-2);
    color: var(--delta-accent-ink);
  }
  .deck-counter {
    font-family: var(--delta-sans);
    font-size: 12px;
    font-variant-numeric: tabular-nums;
    color: var(--delta-ink-soft);
    background: var(--delta-surface-1);
    border: var(--delta-hairline) solid var(--delta-rule);
    border-radius: var(--delta-radius-pill);
    padding: 5px 11px;
    box-shadow: var(--delta-shadow-sm);
    user-select: none;
  }

  /* Running header (JS on) — a faint "AUTHOR · AFFILIATION" eyebrow pinned to the top
     edge so a deck always carries whose talk it is. Built by deck.ts and tagged
     `eyebrow` so it inherits that primitive's look (sans, uppercase, tracked, mute);
     this only positions it. `pointer-events: none` so it never blocks a slide or the
     controls; deck.ts fades it out on the cover and on dividers (.topbar-hidden). */
  :root[data-type="presentation"].deck-js .deck-topbar {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    z-index: 40;
    padding: clamp(8px, 1.6vmin, 14px) clamp(16px, 4vmin, 44px);
    pointer-events: none;
    opacity: 0.7;
    transition: opacity var(--delta-dur) var(--delta-ease);
  }
  :root[data-type="presentation"].deck-js .deck-topbar.topbar-hidden { opacity: 0; }
  :root[data-type="presentation"].deck-js .deck-topbar .tb-author {
    color: var(--delta-accent-ink);
  }

  @media print {
    :root[data-type="presentation"] .deck-controls,
    :root[data-type="presentation"] .deck-topbar { display: none !important; }
  }
}

/* structure.css — runhead, chapter front-matter, section/subsection headings,
   and block display for the layout wrappers. Section headings are LIVE:
   DeltaSection emits <h2 class="section"> / <h3 class="sub"> / <h4 class="subsub">
   with a <span class="num"> pill. The runhead and front-matter elements
   (delta-runhead / delta-eyebrow / delta-deck / delta-meta) are STAGED — their
   rules are inert until those elements ship. Consumes tokens via var(--delta-*). */

@layer delta.components {

/* -- Display defaults for custom elements ------------------------------ */
delta-page,
delta-bleed,
delta-runhead,
delta-chapter,
delta-eyebrow,
delta-title,
delta-deck,
delta-intro,
delta-meta,
delta-meta-item,
delta-section,
delta-subsection,
delta-subsubsection {
  display: block;
}

/* Sectioning containers carry the inter-section spacing; their headings own
   only the gap down to the body, so first-child top margins don't collapse. */
delta-section       { margin: var(--delta-section-gap) 0 0; }
delta-subsection    { margin: 40px 0 0; }
delta-subsubsection { margin: 28px 0 0; }

/* -- Front matter ------------------------------------------------------ */
/* Front matter spans the full writing width — reclaiming the reserved
   sidenote rail like .bleed. The narrow breakpoint below resets it. */
:is(delta-page, delta-chapter) > :is(delta-eyebrow, delta-title, delta-deck, delta-meta) {
  margin-right: calc(-1 * (var(--delta-col-gap) + var(--delta-margin-w)));
}

/* The chapter title, and the document's own top-of-page title. */
.chapter-title,
delta-document > delta-title {
  font-family: var(--delta-serif);
  font-weight: 500;
  font-size: var(--delta-t-h1);
  line-height: 0.98;
  letter-spacing: -0.02em;
  margin: 14px 0 0;
  font-variation-settings: "opsz" 72;
  text-wrap: balance;
}
.chapter-title em,
delta-document > delta-title em {
  font-style: italic;
  color: var(--delta-accent-ink);
}

.chapter-deck {
  font-size: var(--delta-t-deck);
  line-height: 1.45;
  color: var(--delta-ink-soft);
  margin: 24px 0 0;
  max-width: 36em;
  font-weight: 400;
  text-wrap: pretty;
}

/* Chapter/page front-matter meta: the full editorial block. */
:is(delta-page, delta-chapter) > delta-meta {
  margin-top: 28px;
  display: flex;
  flex-wrap: wrap;
  gap: 20px 36px;
  font-family: var(--delta-sans);
  font-size: 12.5px;
  color: var(--delta-mute);
  border-top: var(--delta-hairline) solid var(--delta-rule);
  padding-top: 18px;
}
:is(delta-page, delta-chapter) > delta-meta .k {
  display: block;
  text-transform: uppercase;
  letter-spacing: var(--delta-tracking-cap);
  font-size: 10.5px;
  color: var(--delta-mute);
  margin-bottom: 4px;
}
:is(delta-page, delta-chapter) > delta-meta .v {
  color: var(--delta-ink);
  font-family: var(--delta-serif);
  font-size: 15px;
}

/* -- Section / subsection headings ------------------------------------ */
h2.section {
  font-family: var(--delta-serif);
  font-weight: 500;
  font-size: var(--delta-t-h2);
  line-height: var(--delta-leading-tight);
  letter-spacing: -0.012em;
  margin: 0 0 10px;
  text-wrap: balance;
}

h3.sub {
  font-family: var(--delta-serif);
  font-weight: 500;
  font-size: var(--delta-t-h3);
  letter-spacing: -0.005em;
  margin: 0 0 8px;
}

/* Heading numbers: a quiet gray figure scaled to its own heading text size, so
   every level shares one consistent treatment. */
h2.section .num,
h3.sub .num,
h4.subsub .num { color: var(--delta-mute); margin-right: 0.4em; }

h4.subsub {
  font-family: var(--delta-serif);
  font-weight: 600;
  font-size: var(--delta-t-h4);
  letter-spacing: -0.003em;
  margin: 0 0 6px;
}

/* -- Section front matter (reused chapter elements, quieter) ----------- */
:is(delta-section, delta-subsection, delta-subsubsection) > delta-eyebrow {
  font-family: var(--delta-sans);
  font-size: 10px;
  font-weight: 500;
  letter-spacing: var(--delta-tracking-cap);
  text-transform: uppercase;
  color: var(--delta-accent-ink);
  margin: 0 0 8px;
}

/* Section intro — a newspaper-style deck: the section's lead paragraph, set
   larger than body text and spanning the full writing width by reclaiming the
   sidenote rail on the right (like .bleed). Sits right under the heading; the
   narrow breakpoint below drops the reclaim when the rail collapses. */
delta-intro {
  margin: 2px 0 var(--delta-block-gap);
  margin-right: calc(-1 * (var(--delta-col-gap) + var(--delta-margin-w)));
  min-width: 0;
  font-size: var(--delta-t-deck);
  line-height: 1.45;
  font-weight: 400;
  color: var(--delta-ink-soft);
  text-wrap: pretty;
}

:is(delta-section, delta-subsection, delta-subsubsection) > delta-meta {
  margin-top: 16px;
  padding-top: 10px;
  border-top: var(--delta-hairline) solid var(--delta-rule-soft);
  display: flex;
  flex-wrap: wrap;
  gap: 2px 20px;
  font-family: var(--delta-sans);
  font-size: 11px;
  color: var(--delta-mute);
}
:is(delta-section, delta-subsection, delta-subsubsection) > delta-meta .k {
  text-transform: uppercase;
  letter-spacing: var(--delta-tracking-cap);
  font-size: 9.5px;
  margin-right: 0.5em;
}
:is(delta-section, delta-subsection, delta-subsubsection) > delta-meta .v {
  color: var(--delta-ink-soft);
}

/* -- Running head ----------------------------------------------------- */
.runhead {
  position: sticky;
  top: 0;
  z-index: 40;
  background: color-mix(in oklab, var(--delta-paper) 92%, transparent);
  backdrop-filter: blur(8px) saturate(140%);
  -webkit-backdrop-filter: blur(8px) saturate(140%);
  border-bottom: var(--delta-hairline) solid var(--delta-rule-soft);
}
.runhead-inner {
  max-width: var(--delta-page-max);
  margin: 0 auto;
  padding: 14px var(--delta-page-pad-x);
  display: flex;
  align-items: center;
  gap: 28px;
  font-family: var(--delta-sans);
  font-size: 12px;
  color: var(--delta-mute);
  letter-spacing: 0.04em;
  text-transform: uppercase;
}
.runhead-title {
  color: var(--delta-ink);
  font-family: var(--delta-serif);
  text-transform: none;
  letter-spacing: 0;
  font-size: 15px;
  font-weight: 500;
}
.runhead-spacer { flex: 1; }
.runhead-nav {
  display: flex;
  gap: 22px;
}
.runhead-nav a {
  color: var(--delta-mute);
  text-decoration: none;
  transition: color var(--delta-dur-fast) var(--delta-ease);
}
.runhead-nav a:hover,
.runhead-nav a.is-current { color: var(--delta-ink); }
.runhead-prog {
  height: 2px;
  width: 60px;
  background: var(--delta-rule);
  border-radius: 2px;
  overflow: hidden;
  position: relative;
}
.runhead-prog > i {
  position: absolute;
  inset: 0 auto 0 0;
  background: var(--delta-accent-ink);
}

/* -- TEXT FORMATTING ----------------------------------------------------- */

delta-b {
  display: inline-block;
  font-weight: 500;
}

delta-i {
  display: inline-block;
  font-style: italic;
}

delta-em {
  display: inline-block;
  font-style: italic;
  font-weight:600;
  color: var(--delta-accent-ink);
}

delta-strong {
  display: inline-block;
  font-weight: 600;
}

delta-u {
  display: inline-block;
  text-decoration: underline dashed var(--delta-accent-ink) 1px;
  text-underline-offset: 8px;
}

delta-s {
  display: inline-block;
  text-decoration: line-through;
  text-decoration-thickness: 1px;
}

delta-mark {
  display: inline-block;
  background: var(--delta-accent-soft);
  padding: 0 2px;
  border-radius: var(--delta-radius-pill);
}

/* -- Narrow-viewport adjustments -------------------------------------- */
@media (max-width: 980px) {
  :is(delta-page, delta-chapter) > :is(delta-eyebrow, delta-title, delta-deck, delta-meta) {
    margin-right: 0;
  }
  delta-intro { margin-right: 0; } /* rail collapses — drop the bleed */
}

@media (max-width: 640px) {
  .runhead-inner {
    gap: 14px;
    padding: 10px var(--delta-page-pad-x);
    font-size: 11px;
  }
  .runhead-nav { display: none; }
  .runhead-title { font-size: 13px; }
  .runhead-prog { width: 40px; }

  :is(delta-page, delta-chapter) > delta-meta { gap: 14px 24px; padding-top: 14px; }
  :is(delta-page, delta-chapter) > delta-meta > delta-meta-item { min-width: 42%; }
}

@media (max-width: 380px) {
  :is(delta-page, delta-chapter) > delta-meta > delta-meta-item { min-width: 100%; }
}

@media print {
  .runhead { display: none; }
}

}

/* table.css — data tables. DeltaTable (runtime/elements/table.ts) converts
   <delta-table>/<delta-header>/<delta-row>/<delta-column> into a real
   <table class="t"> inside <div class="table-wrap">, so the cell/border/typography
   look comes entirely from base.css (TABLES & CODE). This file adds only the
   net-new chrome: the title/caption head block and the sticky column header.
